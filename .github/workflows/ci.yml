name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Tests call `ip` and `tc` as subprocesses.  File capabilities set via
      # setcap are not inherited by child processes, so the spawned `ip`/`tc`
      # binaries would still lack CAP_NET_ADMIN.  Running under sudo on this
      # ephemeral CI runner is the simplest reliable solution.
      - name: Run tests
        run: sudo -E $(which cargo) test
